apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nestjs-gitops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/sergioparamo/cloud-native-gitops.git'
    targetRevision: HEAD
    path: apps/my-app
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true